experiment_name: exp15_supervised_gastrohun_vit_small_dinov2_finetune

seed: 42

dataset:
  name: gastrohun
  images_root: data/Labeled_Images_GastroHun
  csv_path: data/official_splits_GastroHun/image_classification.csv
  label_column: Complete agreement
  num_classes: 23

model:
  name: vit_small_patch14_dinov2.lvd142m
  pretrained: true
  freeze_backbone: false

transforms:
  name: supervised_augmented
  image_size: 224

training:
  epochs: 20
  batch_size: 8
  backbone_learning_rate: 0.00001
  head_learning_rate: 0.001
  optimizer: adamw
  weight_decay: 0.01
  early_stopping_patience: 5
  num_workers: 2
