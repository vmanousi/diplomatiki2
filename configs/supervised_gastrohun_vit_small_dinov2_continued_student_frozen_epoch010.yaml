experiment_name: exp27_dinov2_continued_student_gastrohun_vit_small_frozen_epoch010

seed: 42

dataset:
  name: gastrohun
  images_root: data/Labeled_Images_GastroHun
  csv_path: data/official_splits_GastroHun/image_classification.csv
  label_column: Complete agreement
  num_classes: 23

model:
  name: vit_small_patch14_dinov2.lvd142m
  pretrained: false
  # Extract this first: see scripts/extract_backbone_checkpoint.py
  backbone_checkpoint: outputs/experiments/exp20_dino_gastrovision_vit_small_dinov2_continued/student_backbone_epoch010.pt
  freeze_backbone: true

transforms:
  name: supervised_augmented
  image_size: 224

training:
  epochs: 20
  batch_size: 8
  learning_rate: 0.001
  optimizer: adamw
  weight_decay: 0.01
  early_stopping_patience: 5
  num_workers: 2
