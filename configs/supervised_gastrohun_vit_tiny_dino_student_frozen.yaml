experiment_name: exp16_dino_student_gastrohun_vit_tiny_frozen_standardized

seed: 42

dataset:
  name: gastrohun
  images_root: data/Labeled_Images_GastroHun
  csv_path: data/official_splits_GastroHun/image_classification.csv
  label_column: Complete agreement
  num_classes: 23

model:
  name: vit_tiny
  pretrained: false
  backbone_checkpoint: outputs/experiments/exp07_dino_gastrovision_vit_tiny/student_backbone_final.pt
  freeze_backbone: true

transforms:
  name: supervised_augmented
  image_size: 224

training:
  epochs: 20
  batch_size: 8
  learning_rate: 0.001
  optimizer: adamw
  weight_decay: 0.01
  early_stopping_patience: 5
  num_workers: 2
